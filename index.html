<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나의 독서 기록</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#8b6f47" />
  <!-- iOS 홈 화면 추가 지원 -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="독서 기록" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 헤더 -->
  <header class="site-header">
    <div class="header-top">
      <h1 class="site-title">
        <span class="title-icon">📚</span> 나의 독서 기록
      </h1>
      <div class="header-actions">
        <button class="btn btn-accent btn-sm" id="btn-add-book">+ 책 등록</button>
        <div class="more-menu-wrap">
          <button class="btn btn-ghost btn-sm btn-hamburger" id="btn-more-menu" aria-label="메뉴" aria-expanded="false">
            <span class="hamburger-icon"><span></span><span></span><span></span></span>
          </button>
          <div class="more-dropdown hidden" id="more-dropdown">
            <button class="dropdown-item" id="btn-export">📤 JSON 내보내기</button>
            <button class="dropdown-item" id="btn-import-trigger">📥 JSON 가져오기</button>
            <button class="dropdown-item" id="btn-sync">🔄 동기화</button>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item" id="btn-settings">🔑 비밀 키 설정</button>
          </div>
        </div>
        <input type="file" id="import-file-input" accept=".json" hidden />
      </div>
    </div>

    <div class="header-bottom">
      <div class="search-bar">
        <input
          type="text"
          id="kyobo-search-input"
          class="search-input"
          placeholder="교보문고에서 책 검색..."
        />
        <button class="btn btn-accent btn-sm" id="btn-kyobo-search">검색</button>
      </div>
    </div>

    <!-- 동기화 상태 인디케이터 -->
    <div class="sync-indicator hidden" id="sync-indicator">
      <span class="sync-dot"></span>
      <span class="sync-status-text" id="sync-status-text"></span>
    </div>

    <div class="header-tabs">
      <button class="tab-btn active" data-tab="gallery">📚 갤러리</button>
      <button class="tab-btn" data-tab="summary">📊 독서결산</button>
    </div>
  </header>

  <!-- 메인 콘텐츠 -->
  <main class="main-content">

    <!-- 갤러리 뷰 -->
    <section id="view-gallery" class="view active">
      <div class="gallery-filter-tabs" id="gallery-filter-tabs"></div>
      <div id="gallery-container">
        <!-- JS로 렌더링 -->
      </div>
      <div id="gallery-empty" class="empty-state hidden">
        <div class="empty-icon">📖</div>
        <p class="empty-title">아직 등록된 책이 없어요</p>
        <p class="empty-desc">첫 번째 책을 등록해보세요!</p>
        <button type="button" class="btn btn-accent" id="btn-empty-add">책 등록하기</button>
      </div>
    </section>


    <!-- 독서결산 뷰 -->
    <section id="view-summary" class="view hidden">
      <div id="summary-container">
        <!-- JS로 렌더링 -->
      </div>
    </section>

    <!-- 책 상세 페이지 -->
    <section id="view-detail" class="view hidden">
      <div class="detail-card">
        <button class="btn btn-ghost btn-sm back-btn" id="btn-back">← 갤러리로</button>
        <div class="detail-layout">
          <div class="detail-cover-col">
            <img id="detail-cover" src="" alt="책 표지" class="detail-cover hidden" />
            <div id="detail-cover-placeholder" class="detail-cover-placeholder hidden">
              <span>📗</span>
            </div>
          </div>
          <div class="detail-info-col">
            <h2 class="detail-title" id="detail-title"></h2>
            <table class="detail-table">
              <tbody>
                <tr><th>저자</th><td id="detail-author"></td></tr>
                <tr><th>출판사</th><td id="detail-publisher"></td></tr>
                <tr><th>장르</th><td id="detail-genre"></td></tr>
                <tr><th>독서 기간</th><td id="detail-period"></td></tr>
                <tr><th>소장 형태</th><td id="detail-ownership"></td></tr>
                <tr><th>책 형태</th><td id="detail-book-type"></td></tr>
                <tr id="detail-rating-row" class="hidden"><th>별점</th><td id="detail-rating" class="detail-rating"></td></tr>
              </tbody>
            </table>
            <div class="detail-actions">
              <button class="btn btn-accent" id="btn-edit">수정</button>
              <button class="btn btn-danger" id="btn-delete">삭제</button>
            </div>
          </div>
        </div>

        <div class="detail-review-section" id="detail-review-section">
          <h3 class="review-heading">독후감</h3>
          <div class="review-body" id="detail-review"></div>
        </div>
      </div>
    </section>

  </main>

  <!-- 책 등록/수정 모달 -->
  <div id="modal-form" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="form-title">
    <div class="modal-content">
      <button class="modal-close" id="btn-modal-close" aria-label="닫기">✕</button>
      <h2 class="form-title" id="form-title">새 책 등록</h2>
      <form id="book-form" novalidate>
        <input type="hidden" id="book-id" />

        <!-- 책 검색 자동 입력 -->
        <div class="book-search-section">
          <div class="book-search-bar">
            <input
              type="text"
              id="modal-search-input"
              class="form-input"
              placeholder="책 제목이나 저자로 검색하여 자동 입력..."
            />
            <button type="button" class="btn btn-accent btn-sm" id="btn-modal-search">검색</button>
          </div>
          <div id="modal-search-status" class="modal-search-status hidden"></div>
          <div id="modal-search-results" class="search-result-list hidden"></div>
        </div>

        <!-- 표지 이미지 -->
        <div class="form-group cover-upload-group">
          <label class="form-label">책 표지 이미지</label>
          <div class="cover-upload-area" id="cover-upload-area">
            <img id="cover-preview" src="" alt="표지 미리보기" class="cover-preview hidden" />
            <div id="cover-placeholder" class="cover-placeholder">
              <span class="upload-icon">🖼️</span>
              <span class="upload-text">클릭하여 이미지 선택</span>
              <span class="upload-hint">JPG, PNG, WEBP 등</span>
            </div>
            <input type="file" id="cover-input" accept="image/*" hidden />
          </div>
          <button type="button" class="btn btn-ghost btn-xs remove-cover hidden" id="btn-remove-cover">
            이미지 제거
          </button>
        </div>

        <!-- 책 정보 -->
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="input-title">책 이름 <span class="required">*</span></label>
            <input type="text" id="input-title" class="form-input" placeholder="책 이름을 입력하세요" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="input-author">저자 <span class="required">*</span></label>
            <input type="text" id="input-author" class="form-input" placeholder="저자명" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="input-publisher">출판사</label>
            <input type="text" id="input-publisher" class="form-input" placeholder="출판사명" />
          </div>
          <div class="form-group">
            <label class="form-label" for="input-genre">장르</label>
            <select id="input-genre" class="form-input form-select">
              <option value="소설">소설</option>
              <option value="에세이">에세이</option>
              <option value="자기계발">자기계발</option>
              <option value="인문">인문</option>
              <option value="경제경영">경제경영</option>
              <option value="과학">과학</option>
              <option value="기타">기타</option>
            </select>
          </div>
        </div>

        <!-- 독서 상태 -->
        <div class="form-group">
          <label class="form-label">독서 상태</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="status" value="want" />
              <span class="radio-btn"></span>
              읽을 책
            </label>
            <label class="radio-label">
              <input type="radio" name="status" value="reading" />
              <span class="radio-btn"></span>
              읽는 중
            </label>
            <label class="radio-label">
              <input type="radio" name="status" value="done" checked />
              <span class="radio-btn"></span>
              읽은 책
            </label>
          </div>
        </div>

        <div id="dates-section">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="input-start-date">독서 시작일</label>
              <input type="date" id="input-start-date" class="form-input" />
            </div>
            <div class="form-group" id="end-date-group">
              <label class="form-label" for="input-end-date">독서 종료일</label>
              <input type="date" id="input-end-date" class="form-input" />
            </div>
          </div>
        </div>

        <!-- 소장 형태 -->
        <div class="form-group">
          <label class="form-label">소장 형태</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="ownership" value="소장" checked />
              <span class="radio-btn"></span>
              소장
            </label>
            <label class="radio-label">
              <input type="radio" name="ownership" value="대여" />
              <span class="radio-btn"></span>
              대여
            </label>
          </div>
        </div>

        <!-- 책 형태 -->
        <div class="form-group">
          <label class="form-label">책 형태</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="bookType" value="종이책" checked />
              <span class="radio-btn"></span>
              종이책
            </label>
            <label class="radio-label">
              <input type="radio" name="bookType" value="EBOOK" />
              <span class="radio-btn"></span>
              EBOOK
            </label>
          </div>
        </div>

        <!-- 별점 -->
        <div class="form-group" id="rating-section">
          <label class="form-label">별점</label>
          <div class="rating-input" id="rating-input">
            <span class="star-btn" data-value="1">★</span>
            <span class="star-btn" data-value="2">★</span>
            <span class="star-btn" data-value="3">★</span>
            <span class="star-btn" data-value="4">★</span>
            <span class="star-btn" data-value="5">★</span>
            <button type="button" class="btn btn-ghost btn-xs" id="btn-clear-rating">초기화</button>
          </div>
        </div>

        <!-- 독후감 -->
        <div class="form-group">
          <label class="form-label" for="input-review">독후감</label>
          <textarea
            id="input-review"
            class="form-input form-textarea"
            placeholder="이 책에 대한 생각을 자유롭게 적어보세요..."
            rows="8"
          ></textarea>
        </div>

        <!-- 폼 버튼 -->
        <div class="form-actions">
          <button type="submit" class="btn btn-accent" id="btn-submit-form">등록하기</button>
          <button type="button" class="btn btn-ghost" id="btn-reset-form">초기화</button>
          <button type="button" class="btn btn-ghost" id="btn-cancel">취소</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 설정 모달 -->
  <div id="modal-settings" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="settings-title">
    <div class="modal-content settings-modal-content">
      <button class="modal-close" id="btn-settings-close" aria-label="닫기">✕</button>
      <h2 class="form-title" id="settings-title">설정</h2>

      <div class="form-group">
        <label class="form-label" for="input-sync-secret">동기화 비밀 키</label>
        <div class="sync-secret-row">
          <input type="password" id="input-sync-secret" class="form-input" placeholder="비밀 키를 입력하세요" autocomplete="off" />
          <button type="button" class="btn btn-ghost btn-sm" id="btn-toggle-secret">표시</button>
        </div>
        <p class="form-hint">키는 이 기기에만 저장됩니다. 코드에 하드코딩되지 않습니다.</p>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-accent" id="btn-save-secret">저장</button>
        <button type="button" class="btn btn-ghost" id="btn-clear-secret">키 삭제</button>
        <button type="button" class="btn btn-ghost" id="btn-settings-cancel">닫기</button>
      </div>
    </div>
  </div>

  <!-- 책 상세 모달 -->
  <div id="modal-book-detail" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="book-detail-title">
    <div class="modal-content book-detail-modal-content">
      <button class="modal-close" id="btn-detail-modal-close" aria-label="닫기">✕</button>

      <!-- 상단: 2단 (표지 + 정보) -->
      <div class="book-detail-top">
        <div class="book-detail-cover-col">
          <img id="book-detail-cover" src="" alt="" class="book-detail-cover hidden" />
          <div id="book-detail-cover-placeholder" class="book-detail-cover-placeholder hidden">📗</div>
        </div>
        <div class="book-detail-info-col">
          <h2 class="book-detail-title" id="book-detail-title"></h2>
          <table class="detail-table">
            <tbody>
              <tr><th>저자</th><td id="book-detail-author"></td></tr>
              <tr><th>출판사</th><td id="book-detail-publisher"></td></tr>
              <tr><th>장르</th><td id="book-detail-genre"></td></tr>
              <tr><th>독서 기간</th><td id="book-detail-period"></td></tr>
              <tr><th>소장 형태</th><td id="book-detail-ownership"></td></tr>
              <tr><th>책 형태</th><td id="book-detail-book-type"></td></tr>
              <tr id="book-detail-rating-row" class="hidden"><th>별점</th><td id="book-detail-rating" class="detail-rating"></td></tr>
            </tbody>
          </table>
          <div class="detail-actions">
            <button class="btn btn-accent" id="btn-detail-modal-edit">수정</button>
            <button class="btn btn-danger" id="btn-detail-modal-delete">삭제</button>
          </div>
        </div>
      </div>

      <!-- 하단: 1단 (독후감) -->
      <div class="book-detail-review-section hidden" id="book-detail-review-section">
        <h3 class="review-heading">독후감</h3>
        <div class="review-body" id="book-detail-review"></div>
      </div>
    </div>
  </div>

  <!-- 책 미리보기 모달 -->
  <div id="modal-book-preview" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="preview-title">
    <div class="modal-content book-preview-content">
      <button class="modal-close" id="btn-preview-close" aria-label="닫기">✕</button>
      <div class="preview-cover-wrap" id="preview-cover-wrap">
        <img id="preview-cover-img" src="" alt="" class="preview-cover hidden" />
        <div id="preview-cover-placeholder" class="preview-cover-placeholder hidden">📗</div>
      </div>
      <div class="preview-info">
        <div class="preview-genre-wrap" id="preview-genre-wrap"></div>
        <h3 class="preview-title" id="preview-title"></h3>
        <p class="preview-author" id="preview-author"></p>
        <p class="preview-publisher" id="preview-publisher"></p>
        <div class="preview-rating" id="preview-rating"></div>
        <p class="preview-period" id="preview-period"></p>
      </div>
      <button class="btn btn-accent preview-detail-btn" id="btn-preview-detail">상세 보기</button>
    </div>
  </div>

  <!-- 장르 책 목록 모달 -->
  <div id="modal-genre-books" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="genre-modal-title">
    <div class="modal-content genre-books-modal-content">
      <button class="modal-close" id="btn-genre-modal-close" aria-label="닫기">✕</button>
      <h2 class="form-title" id="genre-modal-title"></h2>
      <div class="book-grid" id="genre-books-grid"></div>
    </div>
  </div>

  <!-- 토스트 알림 -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
  <!-- Service Worker 등록 -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .catch((err) => console.warn('SW 등록 실패:', err));
      });
    }
  </script>
</body>
</html>
